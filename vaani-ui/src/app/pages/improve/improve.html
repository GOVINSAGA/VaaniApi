<h2>Improve Text</h2>

<form [formGroup]="improveForm" (ngSubmit)="improve()">

  <textarea formControlName="text" placeholder="Enter your text" aria-label="Text to improve"></textarea>

  <div *ngIf="improveForm.get('text')?.touched && improveForm.get('text')?.invalid" role="alert">
    <small>Text is required (min 3 chars)</small>
  </div>

  <select formControlName="tone" aria-label="Tone">
    <option value="professional">Professional</option>
    <option value="casual">Casual</option>
  </select>

  <button type="submit" [disabled]="improveForm.invalid || loading">
    {{ loading ? 'Processing...' : 'Improve' }}
  </button>

</form>

<div *ngIf="result">
  <h3>Improved Text</h3>
  <p>{{ result.improvedText }}</p>

  <h3>Explanation</h3>
  <p>{{ result.explanation }}</p>


</div>
<button (click)="logout()">Logout</button>

<button (click)="goToHistory()">View History</button>
