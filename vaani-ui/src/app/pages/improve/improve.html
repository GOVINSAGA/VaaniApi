<h2>Improve Text</h2>

<form [formGroup]="improveForm" (ngSubmit)="improve()">
  <div>
    <label for="textInput">Text to Improve</label>
    <textarea id="textInput" formControlName="text" placeholder="Enter your text"></textarea>
    <div *ngIf="improveForm.get('text')?.touched && improveForm.get('text')?.invalid" role="alert">
      <small>Text is required (min 3 chars)</small>
    </div>
  </div>

  <div>
    <label for="toneSelect">Select Tone</label>
    <select id="toneSelect" formControlName="tone">
      <option value="professional">Professional</option>
      <option value="casual">Casual</option>
    </select>
  </div>

  <button type="submit" [disabled]="loading">
    {{ loading ? 'Processing...' : 'Improve' }}
  </button>
</form>

<div aria-live="polite">
  <div *ngIf="result">
    <h3>Improved Text</h3>
    <p>{{ result.improvedText }}</p>

    <h3>Explanation</h3>
    <p>{{ result.explanation }}</p>
  </div>
</div>

<button (click)="logout()">Logout</button>
<button routerLink="/history">View History</button>
