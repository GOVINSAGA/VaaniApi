<h2>Login</h2>

<div *ngIf="errorMessage" style="color: red; background-color: #ffe6e6; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center;">
  {{ errorMessage }}
</div>

<form [formGroup]="loginForm" (ngSubmit)="login()">

  <label for="email">Email</label>
  <input id="email" formControlName="email" placeholder="Email" />
  <div aria-live="polite">
    <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" role="alert">
      <small>Email is required & must be valid</small>
    </div>
  </div>

  <label for="password">Password</label>
  <input id="password" formControlName="password" type="password" placeholder="Password" />
  <div aria-live="polite">
    <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" role="alert">
      <small>Password is required</small>
    </div>
  </div>

  <button type="submit" [disabled]="loginForm.invalid">Login</button>
</form>
