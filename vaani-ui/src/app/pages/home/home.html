<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">
    <div>
      <h2 class="mt-2 text-center text-4xl font-extrabold text-gray-900 tracking-tight">
        Welcome to <span class="text-indigo-600">Vaani</span>
      </h2>
      <p class="mt-4 text-center text-sm text-gray-600">
        Improve your text with AI-powered suggestions. Enhance your writing tone to be professional, casual, or any style you need.
      </p>
    </div>
    <div class="mt-8 space-y-4">
      <button (click)="goToLogin()" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out shadow-sm">
        Log in to your account
      </button>
      <button (click)="goToRegister()" class="w-full flex justify-center py-3 px-4 border border-indigo-300 text-sm font-medium rounded-md text-indigo-700 bg-white hover:bg-indigo-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out shadow-sm">
        Create a new account
      </button>
    </div>
  </div>
</div>
